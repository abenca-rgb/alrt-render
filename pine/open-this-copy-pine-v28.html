<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Copy ALRT Pine v28</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#101318;color:#f4f7fb}header{padding:18px 22px;background:#161b22;border-bottom:1px solid #30363d;position:sticky;top:0}h1{font-size:20px;margin:0 0 8px}p{margin:0;color:#b7c0cc}main{padding:18px 22px}button{background:#2f81f7;color:white;border:0;border-radius:6px;padding:10px 14px;font-size:15px;cursor:pointer;margin-bottom:12px}textarea{width:100%;height:75vh;box-sizing:border-box;background:#0b0f14;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:14px;font-family:Menlo,Consolas,monospace;font-size:12px;line-height:1.45;white-space:pre}.status{display:inline-block;margin-left:10px;color:#8ee68e}</style></head><body><header><h1>ALRT-Next v28 Pine Script</h1><p>Click Copy, then paste into TradingView Pine Editor. If the button does not work, click inside the box, press Cmd+A, then Cmd+C.</p></header><main><button id="copy">Copy Pine Code</button><span id="status" class="status"></span><textarea id="code" spellcheck="false">//@version=6
indicator("ALRT-Next v28 MTF ELITE 15M LIVE RESET ENGINE", overlay=true, max_labels_count=500)

// ==========================
// INPUTS
// ==========================
useLongs  = input.bool(true, "Enable LONG")
useShorts = input.bool(true, "Enable SHORT")

htfTf = input.timeframe("60", "HTF Regime Timeframe")

fastLen  = input.int(9, "Fast EMA")
slowLen  = input.int(21, "Slow EMA")
trendLen = input.int(50, "Trend EMA")

rsiLen = input.int(14, "RSI Length")
atrLen = input.int(14, "ATR Length")
adxLen = input.int(14, "ADX Length")

atrMinPct = input.float(0.25, "Min ATR %", step=0.01)
atrMaxPct = input.float(2.80, "Max ATR %", step=0.01)
adxMin    = input.float(16.0, "Min HTF ADX", step=0.5)

cooldownBars = input.int(6, "Cooldown 15M bars", minval=0)
maxTradeBars = input.int(96, "Max trade age 15M bars", minval=1)

swingLookback = input.int(10, "Swing lookback", minval=3)
atrSlMult     = input.float(0.85, "ATR SL multiplier", step=0.05)
atrTpMultA    = input.float(1.90, "ATR TP multiplier A", step=0.05)
atrTpMultAP   = input.float(2.30, "ATR TP multiplier A+", step=0.05)

minRR = input.float(1.75, "Minimum RR", step=0.05)
maxRR = input.float(3.20, "Maximum RR cap", step=0.05)

minScore   = input.int(9, "Minimum setup score")
eliteScore = input.int(13, "A+ setup score")

maxDistFast = input.float(0.85, "Max distance from 15M fast EMA %", step=0.05)
maxBodyAtr  = input.float(1.25, "Max candle body vs ATR", step=0.05)

showMarkers  = input.bool(true, "Show markers")
showEMAs     = input.bool(true, "Show EMAs")
showDebugLbl = input.bool(false, "Show debug labels")

// ==========================
// HELPERS
// ==========================
engineId = "ALRT_NEXT_V28_15M_1H"
secret = "alrt_secret_01061970"

fmt(_x) =&gt;
    str.tostring(_x, format.mintick)

nowMs() =&gt;
    na(timenow) ? time : timenow

f_adx(_len) =&gt;
    upMove = high - high[1]
    downMove = low[1] - low
    plusDM = upMove &gt; downMove and upMove &gt; 0 ? upMove : 0.0
    minusDM = downMove &gt; upMove and downMove &gt; 0 ? downMove : 0.0
    trur = ta.rma(ta.tr(true), _len)
    plusDI = 100 * ta.rma(plusDM, _len) / trur
    minusDI = 100 * ta.rma(minusDM, _len) / trur
    dx = 100 * math.abs(plusDI - minusDI) / math.max(plusDI + minusDI, 1)
    ta.rma(dx, _len)

calcRR(_side, _entry, _tp, _sl) =&gt;
    reward = _side == 1 ? _tp - _entry : _entry - _tp
    risk = _side == 1 ? _entry - _sl : _sl - _entry
    risk &gt; 0 and reward &gt; 0 ? reward / risk : 0.0

jsonBase(_event, _side, _symbol, _alertId) =&gt;
    '{"secret":"' + secret + '","event":"' + _event + '","system":"ALRT-NEXT","version":"v28","engine_id":"' + engineId + '","side":"' + _side + '","symbol":"' + _symbol + '","tf":"' + timeframe.period + '","alert_id":"' + _alertId + '","signal_alert_id":"' + _alertId + '","parent_alert_id":"' + _alertId + '","time_close":"' + str.tostring(nowMs()) + '","timestamp":"' + str.tostring(nowMs()) + '"'

// ==========================
// TIMEFRAME / COINS
// ==========================
is15M = timeframe.period == "15"

allowed =
     syminfo.ticker == "BTCUSDT" or
     syminfo.ticker == "ETHUSDT" or
     syminfo.ticker == "SOLUSDT" or
     syminfo.ticker == "BNBUSDT" or
     syminfo.ticker == "XRPUSDT" or
     syminfo.ticker == "LINKUSDT" or
     syminfo.ticker == "AVAXUSDT" or
     syminfo.ticker == "ADAUSDT" or
     syminfo.ticker == "DOGEUSDT" or
     syminfo.ticker == "LTCUSDT" or
     syminfo.ticker == "OPUSDT" or
     syminfo.ticker == "ARBUSDT" or
     syminfo.ticker == "ATOMUSDT"

isCore =
     syminfo.ticker == "BTCUSDT" or
     syminfo.ticker == "ETHUSDT" or
     syminfo.ticker == "SOLUSDT" or
     syminfo.ticker == "BNBUSDT" or
     syminfo.ticker == "XRPUSDT" or
     syminfo.ticker == "LINKUSDT"

isMajor =
     syminfo.ticker == "BTCUSDT" or
     syminfo.ticker == "ETHUSDT" or
     syminfo.ticker == "BNBUSDT" or
     syminfo.ticker == "XRPUSDT"

lev = isMajor ? 4 : isCore ? 3 : 2

// ==========================
// 15M EXECUTION DATA
// ==========================
emaFast  = ta.ema(close, fastLen)
emaSlow  = ta.ema(close, slowLen)
emaTrend = ta.ema(close, trendLen)

rsiVal = ta.rsi(close, rsiLen)
atrVal = ta.atr(atrLen)
atrPct = close &gt; 0 ? atrVal / close * 100 : 0.0

barRange = high - low
bodySize = math.abs(close - open)
bodyAtr  = atrVal &gt; 0 ? bodySize / atrVal : 99.0
closePos = barRange &gt; 0 ? (close - low) / barRange : 0.5

bullBody = close &gt; open
bearBody = close &lt; open

distFastPct = emaFast &gt; 0 ? math.abs(close - emaFast) / emaFast * 100 : 999.0

emaFastSlope = emaFast - emaFast[3]
emaSlowSlope = emaSlow - emaSlow[3]

execBullSlope = emaFastSlope &gt; 0 and emaSlowSlope &gt; 0
execBearSlope = emaFastSlope &lt; 0 and emaSlowSlope &lt; 0

// ==========================
// 1H REGIME DATA
// ==========================
htfClose = request.security(syminfo.tickerid, htfTf, close, barmerge.gaps_off, barmerge.lookahead_off)
htfEmaFast  = request.security(syminfo.tickerid, htfTf, ta.ema(close, fastLen), barmerge.gaps_off, barmerge.lookahead_off)
htfEmaSlow  = request.security(syminfo.tickerid, htfTf, ta.ema(close, slowLen), barmerge.gaps_off, barmerge.lookahead_off)
htfEmaTrend = request.security(syminfo.tickerid, htfTf, ta.ema(close, trendLen), barmerge.gaps_off, barmerge.lookahead_off)

htfAtrPct = request.security(syminfo.tickerid, htfTf, ta.atr(atrLen) / close * 100, barmerge.gaps_off, barmerge.lookahead_off)
htfAdx    = request.security(syminfo.tickerid, htfTf, f_adx(adxLen), barmerge.gaps_off, barmerge.lookahead_off)
htfRsi    = request.security(syminfo.tickerid, htfTf, ta.rsi(close, rsiLen), barmerge.gaps_off, barmerge.lookahead_off)

htfBull = htfClose &gt; htfEmaFast and htfEmaFast &gt; htfEmaSlow and htfEmaSlow &gt; htfEmaTrend
htfBear = htfClose &lt; htfEmaFast and htfEmaFast &lt; htfEmaSlow and htfEmaSlow &lt; htfEmaTrend

htfFastSlope = htfEmaFast - htfEmaFast[3]
htfSlowSlope = htfEmaSlow - htfEmaSlow[3]
htfTrendSlope = htfEmaTrend - htfEmaTrend[3]

htfBullSlope = htfFastSlope &gt; 0 and htfSlowSlope &gt; 0 and htfTrendSlope &gt; 0
htfBearSlope = htfFastSlope &lt; 0 and htfSlowSlope &lt; 0 and htfTrendSlope &lt; 0

htfTrendOk = htfAdx &gt;= adxMin
htfVolOk = htfAtrPct &gt;= atrMinPct and htfAtrPct &lt;= atrMaxPct

htfDistFromFastPct = htfEmaFast &gt; 0 ? math.abs(htfClose - htfEmaFast) / htfEmaFast * 100 : 999.0
htfNotExtended = htfDistFromFastPct &lt;= 2.4

htfBullArmed = htfBull and htfBullSlope and htfTrendOk and htfVolOk and htfNotExtended and htfRsi &gt;= 46 and htfRsi &lt;= 72
htfBearArmed = htfBear and htfBearSlope and htfTrendOk and htfVolOk and htfNotExtended and htfRsi &lt;= 54 and htfRsi &gt;= 28

// ==========================
// SESSION ENGINE UTC
// ==========================
h = hour(time, "Etc/UTC")

london   = h &gt;= 7 and h &lt; 12
ny       = h &gt;= 13 and h &lt; 20
overlap  = h &gt;= 13 and h &lt; 16
deadZone = h &gt;= 22 or h &lt; 6

sessionScore = overlap ? 3 : london ? 2 : ny ? 2 : deadZone ? -99 : -1
sessionName = overlap ? "LONDON_NY_OVERLAP" : london ? "LONDON" : ny ? "NEW_YORK" : deadZone ? "DEAD_ZONE" : "NEUTRAL"
sessionAllowed = not deadZone

// ==========================
// 15M MARKET STRUCTURE
// ==========================
atrAvg = ta.sma(atrPct, 30)
compression = atrPct &lt; atrAvg * 0.86
expansion = atrPct &gt; atrAvg * 1.04

rangeHigh = ta.highest(high, 20)
rangeLow = ta.lowest(low, 20)
rangePct = close &gt; 0 ? (rangeHigh - rangeLow) / close * 100 : 0.0

localAdx = f_adx(adxLen)

tightRange = rangePct &lt; atrPct * 2.5
weakLocalTrend = localAdx &lt; 13
chop = tightRange and weakLocalTrend

threeBarMoveLong = close &gt; close[1] and close[1] &gt; close[2] and close[2] &gt; close[3]
threeBarMoveShort = close &lt; close[1] and close[1] &lt; close[2] and close[2] &lt; close[3]

oversizedCandle = bodyAtr &gt; maxBodyAtr
atrSpike = atrPct &gt; atrAvg * 1.65
tooFarFromFast = distFastPct &gt; maxDistFast

exhaustionLong = threeBarMoveLong or oversizedCandle or atrSpike or tooFarFromFast
exhaustionShort = threeBarMoveShort or oversizedCandle or atrSpike or tooFarFromFast

higherLow = low &gt; low[1] or low[1] &gt; low[2]
lowerHigh = high &lt; high[1] or high[1] &lt; high[2]

bullStructure = higherLow and close &gt; emaSlow and emaFast &gt; emaSlow
bearStructure = lowerHigh and close &lt; emaSlow and emaFast &lt; emaSlow

// ==========================
// SETUPS
// ==========================
pullbackLong =
     htfBullArmed and execBullSlope and
     low &lt;= emaFast and close &gt; emaFast and bullBody and
     closePos &gt;= 0.52 and rsiVal &gt;= 45 and rsiVal &lt;= 66 and
     bullStructure and not exhaustionLong

pullbackShort =
     htfBearArmed and execBearSlope and
     high &gt;= emaFast and close &lt; emaFast and bearBody and
     closePos &lt;= 0.48 and rsiVal &lt;= 55 and rsiVal &gt;= 34 and
     bearStructure and not exhaustionShort

compressionBreakLong =
     htfBullArmed and compression[1] and expansion and
     close &gt; ta.highest(high[1], 5) and close &gt; emaFast and
     closePos &gt;= 0.56 and rsiVal &gt;= 48 and rsiVal &lt;= 68 and
     not oversizedCandle and not tooFarFromFast

compressionBreakShort =
     htfBearArmed and compression[1] and expansion and
     close &lt; ta.lowest(low[1], 5) and close &lt; emaFast and
     closePos &lt;= 0.44 and rsiVal &lt;= 52 and rsiVal &gt;= 32 and
     not oversizedCandle and not tooFarFromFast

liquidityReclaimLong =
     htfBullArmed and
     low &lt; ta.lowest(low[1], swingLookback) and
     close &gt; low[1] and close &gt; emaFast and bullBody and
     closePos &gt;= 0.55 and rsiVal &gt;= 40 and rsiVal &lt;= 64 and
     not oversizedCandle and not atrSpike

liquidityReclaimShort =
     htfBearArmed and
     high &gt; ta.highest(high[1], swingLookback) and
     close &lt; high[1] and close &lt; emaFast and bearBody and
     closePos &lt;= 0.45 and rsiVal &lt;= 60 and rsiVal &gt;= 36 and
     not oversizedCandle and not atrSpike

recentLongReset = ta.lowest(low, 5) &lt;= emaFast or ta.lowest(low, 5) &lt;= emaSlow
recentShortReset = ta.highest(high, 5) &gt;= emaFast or ta.highest(high, 5) &gt;= emaSlow

continuationLong =
     htfBullArmed and recentLongReset and execBullSlope and
     close &gt; high[1] and close &gt; emaFast and closePos &gt;= 0.56 and
     rsiVal &gt;= 48 and rsiVal &lt;= 67 and not exhaustionLong and not chop

continuationShort =
     htfBearArmed and recentShortReset and execBearSlope and
     close &lt; low[1] and close &lt; emaFast and closePos &lt;= 0.44 and
     rsiVal &lt;= 52 and rsiVal &gt;= 33 and not exhaustionShort and not chop

longSetupType =
     liquidityReclaimLong ? "LIQUIDITY_RECLAIM" :
     compressionBreakLong ? "COMPRESSION_BREAKOUT" :
     pullbackLong ? "TREND_PULLBACK" :
     continuationLong ? "HTF_CONTINUATION" :
     "NONE"

shortSetupType =
     liquidityReclaimShort ? "LIQUIDITY_RECLAIM" :
     compressionBreakShort ? "COMPRESSION_BREAKOUT" :
     pullbackShort ? "TREND_PULLBACK" :
     continuationShort ? "HTF_CONTINUATION" :
     "NONE"

// ==========================
// SCORE ENGINE
// ==========================
longScore = 0
longScore += htfBullArmed ? 3 : 0
longScore += htfBullSlope ? 2 : 0
longScore += htfTrendOk ? 1 : 0
longScore += htfVolOk ? 1 : 0
longScore += bullStructure ? 1 : 0
longScore += pullbackLong ? 3 : 0
longScore += compressionBreakLong ? 3 : 0
longScore += liquidityReclaimLong ? 3 : 0
longScore += continuationLong ? 2 : 0
longScore += rsiVal &gt;= 47 and rsiVal &lt;= 63 ? 1 : 0
longScore += close &gt; emaFast ? 1 : 0
longScore += sessionScore
longScore -= chop ? 4 : 0
longScore -= exhaustionLong ? 4 : 0
longScore -= isCore ? 0 : 2

shortScore = 0
shortScore += htfBearArmed ? 3 : 0
shortScore += htfBearSlope ? 2 : 0
shortScore += htfTrendOk ? 1 : 0
shortScore += htfVolOk ? 1 : 0
shortScore += bearStructure ? 1 : 0
shortScore += pullbackShort ? 3 : 0
shortScore += compressionBreakShort ? 3 : 0
shortScore += liquidityReclaimShort ? 3 : 0
shortScore += continuationShort ? 2 : 0
shortScore += rsiVal &lt;= 53 and rsiVal &gt;= 37 ? 1 : 0
shortScore += close &lt; emaFast ? 1 : 0
shortScore += sessionScore
shortScore -= chop ? 4 : 0
shortScore -= exhaustionShort ? 4 : 0
shortScore -= isCore ? 0 : 2

longStrength = longScore &gt;= eliteScore ? "A+" : "A"
shortStrength = shortScore &gt;= eliteScore ? "A+" : "A"

longConfidence = longScore &gt;= eliteScore ? "HIGH" : "GOOD"
shortConfidence = shortScore &gt;= eliteScore ? "HIGH" : "GOOD"

marketRegime =
     chop ? "CHOP" :
     compression ? "COMPRESSION" :
     expansion ? "EXPANSION" :
     htfTrendOk ? "TREND" :
     "NEUTRAL"

// ==========================
// LEVEL ENGINE
// ==========================
calcLongLevels(_entry, _strength) =&gt;
    swingLow = ta.lowest(low, swingLookback)
    slRaw = swingLow - atrVal * 0.15
    slAtr = _entry - atrVal * atrSlMult
    sl = math.min(slRaw, slAtr)
    risk = _entry - sl
    rawTp = _entry + atrVal * (_strength == "A+" ? atrTpMultAP : atrTpMultA)
    minTp = _entry + risk * minRR
    maxTp = _entry + risk * maxRR
    tp = math.min(math.max(rawTp, minTp), maxTp)
    [tp, sl, calcRR(1, _entry, tp, sl)]

calcShortLevels(_entry, _strength) =&gt;
    swingHigh = ta.highest(high, swingLookback)
    slRaw = swingHigh + atrVal * 0.15
    slAtr = _entry + atrVal * atrSlMult
    sl = math.max(slRaw, slAtr)
    risk = sl - _entry
    rawTp = _entry - atrVal * (_strength == "A+" ? atrTpMultAP : atrTpMultA)
    minTp = _entry - risk * minRR
    maxTp = _entry - risk * maxRR
    tp = math.max(math.min(rawTp, minTp), maxTp)
    [tp, sl, calcRR(-1, _entry, tp, sl)]

// ==========================
// STATE
// ==========================
var int lastLongBar = na
var int lastShortBar = na
var int seq = 0

var int activeSide = 0
var string activeAlertId = ""
var string activeStrength = ""
var string activeSetupType = ""
var float activeEntry = na
var float activeTp1 = na
var float activeTp2 = na
var float activeSl = na
var int activeOpenedBar = na

var bool eventSentThisBar = false
var bool liveInitialized = false

if barstate.isnew
    eventSentThisBar := false

// TradingView evaluates historical bars before realtime. Without this reset,
// the script can inherit a historical active trade and later send orphan exits.
if barstate.isrealtime and not liveInitialized
    liveInitialized := true
    eventSentThisBar := true
    activeSide := 0
    activeAlertId := ""
    activeStrength := ""
    activeSetupType := ""
    activeEntry := na
    activeTp1 := na
    activeTp2 := na
    activeSl := na
    activeOpenedBar := na

confirmed = barstate.isconfirmed
hadActiveAtBarStart = activeSide != 0 and not na(activeOpenedBar)

// ==========================
// CLOSE EXISTING TRADE FIRST
// ==========================
canCheck = confirmed and hadActiveAtBarStart and bar_index &gt; activeOpenedBar

longTpHit = canCheck and activeSide == 1 and high &gt;= activeTp1
longSlHit = canCheck and activeSide == 1 and not longTpHit and low &lt;= activeSl

shortTpHit = canCheck and activeSide == -1 and low &lt;= activeTp1
shortSlHit = canCheck and activeSide == -1 and not shortTpHit and high &gt;= activeSl

tpHitNow = not eventSentThisBar and (longTpHit or shortTpHit)
slHitNow = not eventSentThisBar and (longSlHit or shortSlHit)

tradeTooOld = confirmed and not eventSentThisBar and hadActiveAtBarStart and not tpHitNow and not slHitNow and bar_index - activeOpenedBar &gt;= maxTradeBars

hitSideStr = activeSide == 1 ? "LONG" : "SHORT"

if tpHitNow
    alert(jsonBase("tp_hit", hitSideStr, syminfo.ticker, activeAlertId) + ',"price":"' + fmt(activeTp1) + '","hit_price":"' + fmt(activeTp1) + '","hit_type":"tp"}', alert.freq_once_per_bar_close)
    eventSentThisBar := true
    activeSide := 0
    activeAlertId := ""
    activeStrength := ""
    activeSetupType := ""
    activeEntry := na
    activeTp1 := na
    activeTp2 := na
    activeSl := na
    activeOpenedBar := na

if slHitNow
    alert(jsonBase("sl_hit", hitSideStr, syminfo.ticker, activeAlertId) + ',"price":"' + fmt(activeSl) + '","hit_price":"' + fmt(activeSl) + '","hit_type":"sl"}', alert.freq_once_per_bar_close)
    eventSentThisBar := true
    activeSide := 0
    activeAlertId := ""
    activeStrength := ""
    activeSetupType := ""
    activeEntry := na
    activeTp1 := na
    activeTp2 := na
    activeSl := na
    activeOpenedBar := na

if tradeTooOld
    movePct = activeSide == 1 ? ((close - activeEntry) / activeEntry) * 100.0 : ((activeEntry - close) / activeEntry) * 100.0
    exitType = movePct &gt; 0.05 ? "time_exit_profit" : movePct &lt; -0.05 ? "time_exit_loss" : "expired"
    alert(jsonBase(exitType, hitSideStr, syminfo.ticker, activeAlertId) + ',"entry":"' + fmt(activeEntry) + '","tp1":"' + fmt(activeTp1) + '","sl":"' + fmt(activeSl) + '","price":"' + fmt(close) + '","hit_price":"' + fmt(close) + '","move_pct":"' + str.tostring(movePct, "#.##") + '","hit_type":"' + exitType + '"}', alert.freq_once_per_bar_close)
    eventSentThisBar := true
    activeSide := 0
    activeAlertId := ""
    activeStrength := ""
    activeSetupType := ""
    activeEntry := na
    activeTp1 := na
    activeTp2 := na
    activeSl := na
    activeOpenedBar := na

// ==========================
// NEW SIGNALS ONLY AFTER CLOSE CHECKS
// ==========================
longCooldownOk = na(lastLongBar) or bar_index - lastLongBar &gt; cooldownBars
shortCooldownOk = na(lastShortBar) or bar_index - lastShortBar &gt; cooldownBars

[longTpPreview, longSlPreview, longRRPreview] = calcLongLevels(close, longStrength)
[shortTpPreview, shortSlPreview, shortRRPreview] = calcShortLevels(close, shortStrength)

longTpPctPreview = close &gt; 0 ? math.abs(longTpPreview - close) / close * 100 : 999.0
longSlPctPreview = close &gt; 0 ? math.abs(close - longSlPreview) / close * 100 : 999.0
shortTpPctPreview = close &gt; 0 ? math.abs(close - shortTpPreview) / close * 100 : 999.0
shortSlPctPreview = close &gt; 0 ? math.abs(shortSlPreview - close) / close * 100 : 999.0

maxTpPct = isMajor ? 3.8 : isCore ? 4.5 : 5.2
maxSlPct = isMajor ? 1.8 : isCore ? 2.2 : 2.6
minTpPct = isMajor ? 0.35 : isCore ? 0.45 : 0.55
minSlPct = isMajor ? 0.20 : isCore ? 0.25 : 0.30

longLevelsOk = longRRPreview &gt;= minRR and longTpPctPreview &gt;= minTpPct and longTpPctPreview &lt;= maxTpPct and longSlPctPreview &gt;= minSlPct and longSlPctPreview &lt;= maxSlPct
shortLevelsOk = shortRRPreview &gt;= minRR and shortTpPctPreview &gt;= minTpPct and shortTpPctPreview &lt;= maxTpPct and shortSlPctPreview &gt;= minSlPct and shortSlPctPreview &lt;= maxSlPct

canOpenNew = confirmed and activeSide == 0 and not hadActiveAtBarStart and not eventSentThisBar

longValid =
     useLongs and is15M and allowed and canOpenNew and
     sessionAllowed and htfBullArmed and
     longSetupType != "NONE" and
     longScore &gt;= minScore and
     longLevelsOk and
     not chop and not exhaustionLong and
     longCooldownOk

shortValid =
     useShorts and is15M and allowed and canOpenNew and
     sessionAllowed and htfBearArmed and
     shortSetupType != "NONE" and
     shortScore &gt;= minScore and
     shortLevelsOk and
     not chop and not exhaustionShort and
     shortCooldownOk

if longValid
    seq += 1
    [tpNow, slNow, rrNow] = calcLongLevels(close, longStrength)
    activeSide := 1
    activeStrength := longStrength
    activeSetupType := longSetupType
    activeAlertId := engineId + "-" + syminfo.ticker + "-LONG-" + str.tostring(time) + "-" + str.tostring(seq)
    activeEntry := close
    activeTp1 := tpNow
    activeTp2 := close + (tpNow - close) * 2.0
    activeSl := slNow
    activeOpenedBar := bar_index
    lastLongBar := bar_index
    eventSentThisBar := true
